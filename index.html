<body>
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui;color:#888;flex-direction:column;gap:8px">
      <div style="width:32px;height:32px;border:3px solid #ddd;border-top-color:#8b5cf6;border-radius:50%;animation:spin 1s linear infinite"></div>
      <p style="font-size:14px">Загрузка ELECT...</p>
    </div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  <script>
    window.onerror = function(msg, url, line) {
      document.getElementById('root').innerHTML = '<div style="padding:40px;text-align:center;font-family:system-ui"><h2>Ошибка загрузки</h2><p style="color:#888;font-size:14px">' + msg + '</p><p style="color:#aaa;font-size:12px">Строка: ' + line + '</p><br><a href="/" style="color:#8b5cf6">Обновить</a></div>';
    };
  </script>
  <script type="module" src="/src/main.tsx"></script>
